version: 1
agent:
  name: profit-premium-planner
  description: |
    Аналитик и архитектор. Исследует кодовую базу Profit-Premium
    и составляет детальный план реализации. Read-only: не пишет код,
    не запускает команды, только исследует и планирует.
  extend: ./main.yaml
  system_prompt_path: ./prompts/planner.md
  tools:
    - "kimi_cli.tools.file:ReadFile"
    - "kimi_cli.tools.file:Glob"
    - "kimi_cli.tools.file:Grep"
    - "kimi_cli.tools.web:FetchURL"
    - "kimi_cli.tools.web:SearchWeb"
    - "kimi_cli.tools.ask_user:AskUserQuestion"
    - "kimi_cli.tools.think:Think"